name: Deploy to Shopify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Vault Theme
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy theme to Shopify
        run: |
          shopify theme push \
            --store "${{ secrets.SHOPIFY_STORE_URL }}" \
            --theme "${{ secrets.SHOPIFY_THEME_ID }}" \
            --password "${{ secrets.SHOPIFY_ACCESS_TOKEN }}" \
            --path . \
            --allow-live
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
